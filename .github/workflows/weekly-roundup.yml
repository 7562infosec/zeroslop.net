name: Weekly AI Roundup

on:
  schedule:
    - cron: '0 9 * * 6'    # 09:00 UTC every Saturday
  workflow_dispatch:         # allow manual trigger

permissions:
  contents: write

jobs:
  weekly-roundup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run weekly roundup
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/weekly_roundup.py

      - name: Commit and push roundup
        run: |
          git config user.name  "zeroslop-bot"
          git config user.email "bot@zeroslop.net"
          git add _posts/
          if git diff --cached --quiet; then
            echo "No weekly roundup to commit."
          else
            git commit -m "chore: weekly roundup $(date -u +%Y-%m-%d)"
            git push
          fi
