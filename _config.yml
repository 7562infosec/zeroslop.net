# zeroslop.net — Jekyll / Chirpy configuration
# -----------------------------------------------
# Built with Chirpy v7.x (https://github.com/cotes2020/jekyll-theme-chirpy)

title: "ZeroSlop.net"
tagline: "Celebrating AI breakthroughs, innovation, and the technology shaping tomorrow — no slop here."
description: "A daily digest of the most exciting AI and technology news: breakthroughs, launches, wins, and ideas worth knowing about."
url: "https://zeroslop.net"
baseurl: ""

# --------------- Author / GitHub ------------------
github:
  username: 7562infosec

social:
  name: ZeroSlop
  email: ""
  links: []

# --------------- Theme ----------------------------
theme: jekyll-theme-chirpy
theme_mode: dark   # dark | light  (omit for auto based on system pref)

# --------------- Avatar ---------------------------
avatar: /assets/img/avatar.png

# --------------- Timezone / Lang ------------------
timezone: America/New_York
lang: en

# --------------- Jekyll Build ---------------------
permalink: /posts/:title/

# --------------- Pagination -----------------------
paginate: 10

# --------------- Feed / SEO -----------------------
feed:
  path: feed.xml

# --------------- Analytics (optional) -------------
# google_analytics:
#   id: G-XXXXXXXXXX

# --------------- Comments (optional) --------------
# comments:
#   active: disqus
#   disqus:
#     shortname: zeroslop

# --------------- Collections ----------------------
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
  - scope:
      path: "_tabs"
      type: tabs
    values:
      layout: page
      permalink: /:title/

# --------------- Exclude from build ---------------
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.sh"
  - scripts/
  - .github/
